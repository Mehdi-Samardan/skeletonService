Metrics:
  activitycount: calc.results.activity_counts.during[-1]
  closerate: calc.results.close_rates[-1]
  closecount: calc.results.closed[-1]
  creaselogicloop:
    function: increase_decrease_formatter
    arguments:
      metric: calc.results.close_rates
  creaselogicactivity:
    function: increase_decrease_formatter
    arguments:
      metric: calc.results.activity_counts.during

Visuals:
  - shape_index: 5
    function: DonutCustomDistribution
    arguments:
      names:
        Closed: calc.results.close_rates[-1]
        Open: NoResult()
      data_labels: True
  - shape_index: 3
    function: DonutCustomDistribution
    arguments:
      names:
        Logged in: calc.results.activity_rates[-1]
        Not logged in: NoResult()
      data_labels: True
  

Requirements:
  - Activity

Back-up: Engagement

Formatting:
  0: Page number
  1: Upper title
  2: Title
  4: Main text

Texts:
  title:
    English: The loop is closed for <<closecount>> (<<closerate>>) respondents.
    Dutch: De loop van <<closerate>> (<<closecount>>) van de respondenten is gesloten.
  uppertitle: 
    English: Engagement
    Dutch: Betrokkenheid
  sentenceone:
    English: During the wave <<closecount>> respondents have their loop marked as closed in the tool. This <<creaselogicloop>>.
    Dutch: Tijdens de wave heeft <<closecount>> respondenten hun loop gemarkeerd als gesloten in de tool. Dit <<creaselogicloop>>.
  sentencetwo:
    English: During the wave <<activitycount>> account managers have logged into the tool. This means that this group was able to actively check its non-respondents and read the feedback from respondents. This <<creaselogicactivity>>.
    Dutch: Tijdens de wave hebben <<activitycount>> accountmanagers ingelogd in de tool. Dit betekent dat deze groep actief hun non-respondenten kon checken en de feedback van respondenten kon lezen. Dit <<creaselogicactivity>>.
  titlevisualone:
    English: Close the loop
    Dutch: Close the loop
  titlevisualtwo:
    English: Use of tool
    Dutch: Gebruik van de tool

Contents:
  - type: Close rate
    over_time: false
