Texts:
  uppertitle:
    English: Process statistics
    Dutch: Proces statistieken
  title:
      "*": "- Action title goes here -"
  sentenceone: 
    English: The number of invited contacts << creaselogicinvited >>.
    Dutch: Het aantal contacten dat is uitgenodigd << creaselogicinvited >>.
  sentencetwo: 
    English: The number of responses << creaselogicresponse >>.
    Dutch: Het aantal respondenten << creaselogicresponse >>.
  sentencethree: 
    English: The delivery rate << creaselogicdeliveryrate >>. 
    Dutch: Het afleveringspercentage << creaselogicdeliveryrate >>.
  sentencefour:
    English: The response rate << creaselogicresrate >>.
    Dutch: Het responspercentage << creaselogicresrate >>.
  titlevisualone:
    "*": Invites & responses
  titlevisualtwo:
    "*": Delivery rate
  titlevisualthree:
    "*": Response rate

Metrics:
  creaselogicinvited:
    function: increase_decrease_formatter
    arguments:
      metric: calc.results.invited
  creaselogicresponse:
    function: increase_decrease_formatter
    arguments:
      metric: calc.results.responses
  creaselogicdeliveryrate:
    function: increase_decrease_formatter
    arguments:
      metric: calc.results.delivery_rates
  creaselogicresrate:
    function: increase_decrease_formatter
    arguments:
      metric: calc.results.response_rates

Visuals:
  - shape_index: 1
    function: GeneralVisual
    arguments:
      title: ["Invited", "Responses"]
      serie: [calc.results.invited, calc.results.responses]
      add_data_labels: False
  - shape_index: 1
    function: GeneralVisual
    arguments:
      title: "Delivery rate"
      serie: calc.results.delivery_rates
      target: Delivery rate
      num_format: "%"
  - shape_index: 2
    function: GeneralVisual
    arguments:
      title: "Response rate"
      serie: calc.results.response_rates
      target: Response rate
      num_format: "%"

Formatting:
  0: Page number
  4: Main text
  5: Upper title
  6: Title

Requirements:
  - Batch
  - Waves

Back-up: Process results - one wave



Afterthought:
  - shape_index: 6
    function: CreateActionTitle
    use_slides:
      - Process results

Contents:
  - type: Delivery rate
    over_time: true
  - type: Number invited
    over_time: true
  - type: Response rate
    over_time: true
  - type: Number of responses
    over_time: true
