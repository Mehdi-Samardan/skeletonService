Visuals:
  - shape_index: 4
    function: TextGptAnalysis
    arguments:
      analysis_type: summarize
      metric: Recommendation (Motivation)
      name:
        Dutch: "motivatie aanbeveling"
      placeholder: motivation
  - shape_index: 10
    function: BarsCustomDistribution
    arguments:
      column: "Geslacht"
      serie_based: False
      groups:
        Male: Man
        Female: Vrouw
        Other: Anders
      num_format: "%"
  - shape_index: 11
    function: BarsCustomDistribution
    arguments:
      column: "Type bezoeker"
      serie_based: False
      groups:
        Season ticket holder: Abonnementhouder
        Day visitor: Dagbezoeker
      num_format: "%"
  - shape_index: 12
    function: BarsCustomDistribution
    arguments:
      column: "Leeftijdscategorie"
      serie_based: False
      order:
        - "$0-17"
        - "$18-29"
        - "$30-39"
        - "$40-49"
        - "$50-64"
        - "$65+"
      num_format: "%"
  - shape_index: 13
    function: BarsCustomMultipleChoice
    arguments:
      identifier: "Gezelschap:"
      serie_based: False
      groups:
        Alone: Alleen
        Partner: Partner
        A group including children under 13: Kids <13
        A group including children between 13 and 17 years old: Kids 13-17
        Other family members: Familie
        Friends: Vrienden
        Business: Zakelijk
        Students: Studenten
        Other: Anders
  - shape_index: 18
    function: TextGptAnalysis
    arguments:
      analysis_type: actionable_aspects
      metric: Tip
      name:
        Dutch: "gegeven tips"
      placeholder: ottc

Texts:
  title:
    "*": << title >>
