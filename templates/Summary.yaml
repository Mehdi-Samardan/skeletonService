Metrics:
  maxscore: calc.results.max_statement[-1].scores[-1].value
  minscore: calc.results.min_statement[-1].scores[-1].value
  minstatement: calc.results.min_statement[-1].alias
  maxstatement: calc.results.max_statement[-1].alias
  creaselogicnps:
    function: increase_decrease_formatter
    arguments:
      metric: calc.results.nps
  creaselogicresprate:
    function: increase_decrease_formatter
    arguments:
      metric: calc.results.response_rates
  creaselogicinvited:
    function: increase_decrease_formatter
    arguments:
      metric: calc.results.invited
  responsn: calc.results.responses[-1].value
  wavename: calc.waves[-1].lower()
  numberofwaves: len(calc.waves)


