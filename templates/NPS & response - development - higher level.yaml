Metrics:
  lvlname: calc.level.name
  npsthisyear: calc.results.nps[-1].value
  responseratethisyear: calc.results.response_rates[-1].value

Visuals:
  - shape_index: 1
    function: ColumnClusteredDevelopmentMetricPerBusinessUnit
    arguments:
      level: parents
      metric: response_rates
  
  - shape_index: 4
    function: ColumnClusteredDevelopmentMetricPerBusinessUnit
    arguments:
      level: parents
      metric: nps

Requirements:
  - Parents
  - Results
  - Batch

Formatting:
  0: Page number
  2: Upper title
  3: Title

Texts:
  title:
    English: <<lvlname>> has an NPS score of <<npsthisyear>>. The response rate is <<responseratethisyear>>.
    Dutch: <<lvlname>> heeft een NPS score van <<npsthisyear>>. Het responspercentage is <<responseratethisyear>>.
  uppertitle:
    English: Development NPS & response rate vs. upper business units
    Dutch: Ontwikkeling NPS score & responspercentage vs. hoger gelegen business units
  titlevisualone:
    English: Development NPS score
    Dutch: Ontwikkeling NPS score
  titlevisualtwo:
    English: Development response rate
    Dutch: Ontwikkeling responspercentage


Afterthought:
  - shape_index: 3
    function: CreateActionTitle
    use_slides:
      - NPS & response - development - higher level

